<!doctype html><meta charset="utf-8" />
<h1>HIKO headless sign-in (dev)</h1>
<div id="mount"></div>
<button id="logout" hidden>Sign out</button>
<pre id="out"></pre>
<script type="module">
  import "./src/element.js";

  const el = document.createElement("hiko-signin");
  el.setAttribute("shop", import.meta.env.VITE_SHOP);
  el.setAttribute("config-server", import.meta.env.VITE_CONFIG_SERVER || "https://signin.hiko.software");
  // Popup mode: opens a popup for the OAuth handshake and self-closes it,
  // handing the session back to this page via postMessage.
  el.setAttribute("mode", "popup");
  document.getElementById("mount").appendChild(el);

  const out = document.getElementById("out");
  const logoutBtn = document.getElementById("logout");

  // Hide the sign-in widget once signed in; show it again after logout.
  function reflectAuth(signedIn) {
    el.style.display = signedIn ? "none" : "";
    logoutBtn.hidden = !signedIn;
  }

  async function showCustomer(customer) {
    try {
      // In popup mode hiko:login carries the customer in event.detail; otherwise query it.
      const c = customer ?? (await el.query("{ customer { firstName lastName emailAddress { emailAddress } } }"))?.customer ?? {};
      const tok = await el.getToken();
      out.textContent =
        "Email: " + (c.emailAddress?.emailAddress ?? "—") + "\n" +
        "Name:  " + [c.firstName, c.lastName].filter(Boolean).join(" ") + "\n" +
        "Customer Account API token:\n" + (tok?.accessToken ?? "—") + "\n" +
        "(expires " + (tok?.expiresAt ? new Date(tok.expiresAt).toISOString() : "—") + ")";
    } catch (e) { out.textContent = "Error: " + e.message; }
  }

  el.addEventListener("hiko:login", async (e) => {
    reflectAuth(true);                       // access token obtained → hide the widget
    await showCustomer(e.detail?.customer ?? null);
  });

  el.addEventListener("hiko:logout", () => {
    // Housekeeping: clear the customer panel and bring the widget back.
    out.textContent = "(signed out — click a provider above)";
    reflectAuth(false);
  });

  logoutBtn.addEventListener("click", async () => {
    logoutBtn.disabled = true;
    // el.logout() deletes the broker session, clears the in-memory token,
    // and fires hiko:logout (handled above). That is the housekeeping.
    try { await el.logout(); } finally { logoutBtn.disabled = false; }
  });

  // Initial state on a fresh load (in-memory session → signed out).
  const signedIn = el.isLoggedIn?.() ?? false;
  reflectAuth(signedIn);
  if (!signedIn) out.textContent = "(not signed in — click a provider above)";
</script>
